<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How a concept query infers a vault's semantic structure and returns member notes</title>
<desc>An example vault is mapped into embedding space where character, location and system notes form latent clusters with no tags. A query "characters" is expanded from the index note toward the members' region, returning the individual character notes.</desc>
<style>
text{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
.h{font-size:16px;font-weight:500;}.mut{font-size:12px;}.lbl{font-size:12px;font-weight:500;}.chp{font-size:11px;}
.map{fill:none;stroke:#d1d5db;}
.cA{fill:#e8f0fe;stroke:#4285f4;}.cB{fill:#ddf5f0;stroke:#14b8a6;}.cC{fill:#fdf0d8;stroke:#f59e0b;}.cI{fill:#eef1f4;stroke:#94a3b8;}
.chip{fill:#ffffff;stroke:#e5e7eb;}
.tInk{fill:#1f2937;}.tMut{fill:#6b7280;}.tA{fill:#1a3a8f;}.tB{fill:#0f5f57;}.tC{fill:#8a5a06;}.tI{fill:#475569;}
.arw{stroke:#9ca3af;stroke-width:1.5;fill:none;}.arwf{fill:#9ca3af;}
@media (prefers-color-scheme:dark){
.map{stroke:#374151;}
.cA{fill:#16233f;stroke:#5b8def;}.cB{fill:#0c2a27;stroke:#2dd4bf;}.cC{fill:#342810;stroke:#fbbf24;}.cI{fill:#1f2733;stroke:#64748b;}
.chip{fill:#0f1623;stroke:#374151;}
.tInk{fill:#e5e7eb;}.tMut{fill:#9ca3af;}.tA{fill:#bcd0ff;}.tB{fill:#99f6e4;}.tC{fill:#fde68a;}.tI{fill:#cbd5e1;}
.arw{stroke:#6b7280;}.arwf{fill:#6b7280;}
}
</style>
<defs><marker id="m" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" class="arwf"/></marker></defs>

<text class="h tInk" x="40" y="30">Inferring a vault's structure to answer a concept query</text>
<text class="mut tMut" x="40" y="50">the latent categories are learned from the embeddings — no tags or links required</text>

<rect class="map" x="40" y="66" width="600" height="266" rx="12"/>
<text class="mut tMut" x="56" y="86">your vault in embedding space</text>

<rect class="cA" x="64" y="96" width="236" height="150" rx="12"/>
<text class="lbl tA" x="76" y="116">characters</text>
<rect class="chip" x="76" y="124" width="108" height="22" rx="6"/><text class="chp tA" x="130" y="139" text-anchor="middle">Jin Wei</text>
<rect class="chip" x="76" y="152" width="108" height="22" rx="6"/><text class="chp tA" x="130" y="167" text-anchor="middle">Vulcan</text>
<rect class="chip" x="76" y="180" width="108" height="22" rx="6"/><text class="chp tA" x="130" y="195" text-anchor="middle">Whispering Shadow</text>
<rect class="chip" x="192" y="124" width="100" height="22" rx="6"/><text class="chp tA" x="242" y="139" text-anchor="middle">Tempest</text>
<rect class="chip" x="192" y="152" width="100" height="22" rx="6"/><text class="chp tA" x="242" y="167" text-anchor="middle">Mother of life</text>

<rect class="cB" x="336" y="96" width="280" height="96" rx="12"/>
<text class="lbl tB" x="348" y="116">locations</text>
<rect class="chip" x="348" y="124" width="120" height="22" rx="6"/><text class="chp tB" x="408" y="139" text-anchor="middle">Nova Union</text>
<rect class="chip" x="348" y="152" width="120" height="22" rx="6"/><text class="chp tB" x="408" y="167" text-anchor="middle">Zenith Republic</text>
<rect class="chip" x="476" y="124" width="120" height="22" rx="6"/><text class="chp tB" x="536" y="139" text-anchor="middle">Nexus Enclave</text>

<rect class="cC" x="336" y="210" width="280" height="84" rx="12"/>
<text class="lbl tC" x="348" y="230">systems</text>
<rect class="chip" x="348" y="238" width="120" height="22" rx="6"/><text class="chp tC" x="408" y="253" text-anchor="middle">Runic Scripting</text>
<rect class="chip" x="476" y="238" width="120" height="22" rx="6"/><text class="chp tC" x="536" y="253" text-anchor="middle">Techno Nodes</text>

<rect class="cI" x="96" y="266" width="172" height="24" rx="12"/><text class="chp tI" x="182" y="282" text-anchor="middle">GoA Characters (index note)</text>
<text class="mut tMut" x="182" y="312" text-anchor="middle">a note ABOUT the category — the naive top hit</text>

<text class="mut tMut" x="40" y="356">how "characters" resolves to its members:</text>
<rect class="cI" x="40" y="366" width="120" height="48" rx="8"/><text class="lbl tInk" x="100" y="388" text-anchor="middle">query</text><text class="chp tMut" x="100" y="404" text-anchor="middle">"characters"</text>
<line class="arw" x1="160" y1="390" x2="186" y2="390" marker-end="url(#m)"/>
<rect class="cI" x="188" y="366" width="150" height="48" rx="8"/><text class="lbl tI" x="263" y="388" text-anchor="middle">naive hit</text><text class="chp tMut" x="263" y="404" text-anchor="middle">the index note</text>
<line class="arw" x1="338" y1="390" x2="364" y2="390" marker-end="url(#m)"/>
<rect class="cC" x="366" y="366" width="146" height="48" rx="8"/><text class="lbl tC" x="439" y="388" text-anchor="middle">expand</text><text class="chp tC" x="439" y="404" text-anchor="middle">to the members' region</text>
<line class="arw" x1="512" y1="390" x2="538" y2="390" marker-end="url(#m)"/>
<rect class="cA" x="540" y="366" width="100" height="48" rx="8"/><text class="lbl tA" x="590" y="388" text-anchor="middle">members</text><text class="chp tA" x="590" y="404" text-anchor="middle">Jin Wei…</text>

<text class="mut tMut" x="40" y="446">members win because ranking pivots to the cluster's prototype, not the query word — concept search is in design.</text>
</svg>
